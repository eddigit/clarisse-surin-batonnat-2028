<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nos Soutiens — Clarisse Surin, Bâtonnat 2028</title>
    <meta name="description" content="Ils soutiennent Clarisse Surin pour le Bâtonnat de Paris 2028.">
    <meta name="theme-color" content="#0c1525">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-1: #0e1526;
            --navy-2: #121d33;
            --navy-3: #162540;
            --navy-4: #1c2e50;
            --navy-card: #152038;
            --navy-card-hover: #1a2845;
            --navy-border: rgba(200, 175, 100, 0.08);
            --navy-border-hover: rgba(200, 175, 100, 0.18);
            --or: #c8a04a;
            --or-clair: #dbb95e;
            --or-fonce: #8a6e2e;
            --or-glow: rgba(200, 160, 74, 0.12);
            --text-bright: #e8e2d8;
            --text-body: #b0a898;
            --text-muted: #7a7268;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html { scrollbar-width: thin; scrollbar-color: var(--or-fonce) var(--navy-1); }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--navy-2);
            color: var(--text-bright);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }
        a { text-decoration: none; color: inherit; }
        ::selection { background: var(--or); color: var(--navy-1); }

        /* NAV */
        nav {
            padding: 26px 5vw;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(14, 21, 38, 0.92);
            backdrop-filter: blur(40px) saturate(1.3);
            border-bottom: 1px solid var(--navy-border);
            position: sticky; top: 0; z-index: 100;
        }
        .nav-brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem; font-weight: 600;
            letter-spacing: 4px; text-transform: uppercase;
        }
        .nav-brand em { font-style: normal; color: var(--or); }
        .nav-back {
            font-size: 0.7rem; font-weight: 500;
            letter-spacing: 2px; text-transform: uppercase;
            color: var(--text-body);
            display: flex; align-items: center; gap: 8px;
            transition: color 0.3s;
        }
        .nav-back:hover { color: var(--or); }

        /* HEADER */
        .page-header {
            padding: 80px 8vw 50px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .page-header::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at center top, rgba(200,160,74,0.06), transparent 60%);
            pointer-events: none;
        }
        .page-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem; color: var(--or);
            letter-spacing: 5px; text-transform: uppercase;
            margin-bottom: 20px;
            display: inline-flex; align-items: center; gap: 16px;
        }
        .page-label::before, .page-label::after { content: ''; width: 30px; height: 1px; background: var(--or-fonce); }
        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 700; line-height: 1.1;
        }
        .page-title .em { color: var(--or); font-style: italic; }
        .page-subtitle {
            font-size: 1rem; color: var(--text-body);
            margin-top: 16px; line-height: 1.7;
        }

        /* COUNTER */
        .counter-strip {
            display: flex; justify-content: center; gap: 60px;
            padding: 30px 8vw;
            border-top: 1px solid var(--navy-border);
            border-bottom: 1px solid var(--navy-border);
            background: var(--navy-1);
        }
        .counter-item { text-align: center; }
        .counter-val {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem; font-weight: 700; color: var(--or); line-height: 1;
        }
        .counter-lbl {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.5rem; color: var(--text-muted);
            letter-spacing: 4px; text-transform: uppercase; margin-top: 6px;
        }

        /* GRID */
        .soutiens-container { padding: 50px 8vw 80px; }
        .soutiens-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        /* CARD */
        .soutien-card {
            padding: 34px 28px;
            background: var(--navy-card);
            border: 1px solid var(--navy-border);
            position: relative; overflow: hidden;
            transition: all 0.5s var(--ease-out-expo);
            opacity: 0; transform: translateY(30px);
            animation: cardIn 0.6s var(--ease-out-expo) forwards;
        }
        .soutien-card:nth-child(1) { animation-delay: 0s; }
        .soutien-card:nth-child(2) { animation-delay: 0.05s; }
        .soutien-card:nth-child(3) { animation-delay: 0.1s; }
        .soutien-card:nth-child(4) { animation-delay: 0.15s; }
        .soutien-card:nth-child(5) { animation-delay: 0.2s; }
        .soutien-card:nth-child(6) { animation-delay: 0.25s; }
        .soutien-card:nth-child(n+7) { animation-delay: 0.3s; }

        @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }

        .soutien-card::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle 180px at var(--mx, 50%) var(--my, 50%), var(--or-glow), transparent);
            opacity: 0; transition: opacity 0.5s; pointer-events: none;
        }
        .soutien-card:hover::before { opacity: 1; }
        .soutien-card:hover {
            border-color: var(--navy-border-hover);
            transform: translateY(-4px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .soutien-card::after {
            content: ''; position: absolute; left: 0; top: 0;
            width: 2px; height: 100%;
            background: linear-gradient(180deg, var(--or), var(--navy-4));
            transform: scaleY(0); transform-origin: top;
            transition: transform 0.7s var(--ease-out-expo);
        }
        .soutien-card:hover::after { transform: scaleY(1); }

        .card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
        .card-avatar {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--navy-4);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.95rem; font-weight: 700; color: var(--or);
            flex-shrink: 0;
        }
        .card-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15rem; font-weight: 600;
        }
        .card-meta {
            font-size: 0.72rem; color: var(--text-muted); margin-top: 2px;
        }

        .card-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
        .badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.48rem; letter-spacing: 2px; text-transform: uppercase;
            padding: 5px 12px;
            border: 1px solid var(--navy-border);
            color: var(--or-clair);
        }

        .card-message {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem; font-style: italic;
            line-height: 1.6; color: var(--text-body);
            border-left: 2px solid var(--or-fonce);
            padding-left: 16px;
        }
        .card-message::before { content: '"'; color: var(--or); font-size: 1.4rem; }

        .card-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.48rem; color: var(--text-muted);
            letter-spacing: 2px; margin-top: 14px;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center; padding: 80px 20px;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 20px; opacity: 0.3; }
        .empty-state h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem; margin-bottom: 10px;
        }
        .empty-state p { color: var(--text-muted); }
        .empty-state a {
            display: inline-block; margin-top: 20px;
            padding: 14px 36px;
            background: var(--or); color: var(--navy-1);
            font-size: 0.7rem; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
        }

        /* FOOTER */
        footer {
            padding: 40px 8vw; background: var(--navy-1);
            border-top: 1px solid var(--navy-border);
            text-align: center;
        }
        .footer-copy {
            font-size: 0.6rem; color: var(--text-muted);
        }
        .footer-copy a {
            color: rgba(200, 160, 74, 0.6);
            border-bottom: 1px solid var(--or-fonce);
            transition: color 0.3s;
        }
        .footer-copy a:hover { color: var(--or); }

        /* LOADING */
        .loading { text-align: center; padding: 60px; }
        .loading-spinner {
            width: 36px; height: 36px; border: 2px solid var(--navy-4);
            border-top-color: var(--or); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .page-header { padding: 50px 6vw 30px; }
            .soutiens-container { padding: 30px 6vw 60px; }
            .soutiens-grid { grid-template-columns: 1fr; }
            .counter-strip { gap: 30px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-brand"><em>CS</em> — 2028</a>
        <a href="index.html" class="nav-back">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Retour au site
        </a>
    </nav>

    <div class="page-header">
        <div class="page-label">Mobilisation</div>
        <h1 class="page-title">Ils prennent <span class="em">position</span></h1>
        <p class="page-subtitle">Chaque soutien compte. Découvrez celles et ceux qui rejoignent le mouvement.</p>
    </div>

    <div class="counter-strip">
        <div class="counter-item">
            <div class="counter-val" id="totalCount">—</div>
            <div class="counter-lbl">Soutiens</div>
        </div>
        <div class="counter-item">
            <div class="counter-val">2028</div>
            <div class="counter-lbl">Objectif</div>
        </div>
    </div>

    <div class="soutiens-container">
        <div id="soutiensGrid" class="soutiens-grid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p style="color:var(--text-muted);font-size:0.85rem;">Chargement des soutiens…</p>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-copy">© 2026 Campagne Clarisse Surin — Bâtonnat de Paris 2028. — Design &amp; développement <a href="https://coachdigitalparis.com" target="_blank" rel="noopener">G.&nbsp;Korzec</a></div>
    </footer>

    <script>
    (function() {
        const API = 'https://api.mybotia.com/api/soutiens';
        const grid = document.getElementById('soutiensGrid');
        const totalEl = document.getElementById('totalCount');

        const statutMap = {
            collaborateur: 'Collaborateur',
            associe: 'Associé',
            individuel: 'Individuel',
            eleve: 'Élève-avocat',
            honoraire: 'Honoraire'
        };
        const barreauMap = { paris: 'Barreau de Paris', autre: 'Autre barreau' };

        function formatDate(d) {
            return new Date(d).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function getInitials(prenom, nomInitial) {
            return (prenom[0] || '').toUpperCase() + (nomInitial[0] || '').toUpperCase();
        }

        function renderCard(s) {
            const initials = getInitials(s.prenom, s.nom_initial);
            const statut = statutMap[s.statut] || s.statut || '';
            const barreau = barreauMap[s.barreau] || s.barreau || '';
            const meta = [statut, barreau].filter(Boolean).join(' — ');

            let html = `
                <div class="soutien-card">
                    <div class="card-header">
                        <div class="card-avatar">${initials}</div>
                        <div>
                            <div class="card-name">${s.prenom} ${s.nom_initial}</div>
                            ${meta ? `<div class="card-meta">${meta}</div>` : ''}
                        </div>
                    </div>`;

            const badges = [];
            if (s.specialite) badges.push(s.specialite);
            if (badges.length) {
                html += `<div class="card-badges">${badges.map(b => `<span class="badge">${b}</span>`).join('')}</div>`;
            }

            if (s.message) {
                html += `<div class="card-message">${s.message}</div>`;
            }

            html += `<div class="card-date">${formatDate(s.created_at)}</div></div>`;
            return html;
        }

        function animCount(el, target) {
            const dur = 2000;
            const t0 = performance.now();
            (function tick(now) {
                const p = Math.min((now - t0) / dur, 1);
                const eased = 1 - Math.pow(1 - p, 5);
                el.textContent = Math.floor(eased * target);
                if (p < 1) requestAnimationFrame(tick);
            })(t0);
        }

        async function load() {
            try {
                const res = await fetch(API);
                const data = await res.json();

                animCount(totalEl, data.total);

                if (data.soutiens.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state" style="grid-column:1/-1;">
                            <div class="icon">🏛️</div>
                            <h3>Le mouvement commence ici</h3>
                            <p>Soyez le premier à prendre position.</p>
                            <a href="index.html#soutien">Rejoindre →</a>
                        </div>`;
                    return;
                }

                grid.innerHTML = data.soutiens.map(renderCard).join('');

                // Card cursor glow
                grid.querySelectorAll('.soutien-card').forEach(c => {
                    c.addEventListener('mousemove', (e) => {
                        const r = c.getBoundingClientRect();
                        c.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100) + '%');
                        c.style.setProperty('--my', ((e.clientY - r.top) / r.height * 100) + '%');
                    });
                });

            } catch (err) {
                console.error(err);
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="icon">⚠️</div>
                        <h3>Chargement en cours</h3>
                        <p>Les soutiens seront disponibles prochainement.</p>
                        <a href="index.html#soutien">Rejoindre le mouvement →</a>
                    </div>`;
                totalEl.textContent = '—';
            }
        }

        load();
    })();
    </script>
</body>
</html>
