<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Soutenez Clarisse Surin — Bâtonnat 2028</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0f1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy: #0f1a2e;
            --navy-mid: #162240;
            --or: #c8a04a;
            --or-clair: #dbb95e;
            --or-pale: rgba(200, 160, 74, 0.12);
            --text-bright: #f0ebe2;
            --text-muted: #8a8278;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--navy);
            color: var(--text-bright);
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        /* Grain overlay */
        .grain {
            position: fixed; inset: 0; z-index: 100;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* Glow ambient */
        .glow {
            position: fixed;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200,160,74,0.06) 0%, transparent 70%);
            top: -100px; left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 48px 32px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0;
            animation: fadeUp 0.8s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Photo */
        .photo {
            width: 130px; height: 130px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--or);
            box-shadow: 0 0 40px rgba(200,160,74,0.15);
            margin-bottom: 24px;
        }
        .photo img {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* Name */
        .name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--text-bright);
            margin-bottom: 6px;
        }

        .tagline {
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--or);
            margin-bottom: 32px;
        }

        /* QR container */
        .qr-wrap {
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .qr-wrap img, .qr-wrap canvas {
            display: block;
            width: 200px;
            height: 200px;
        }

        .scan-label {
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            margin-bottom: 28px;
        }

        /* CTA */
        .cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            background: linear-gradient(135deg, var(--or), var(--or-clair));
            color: var(--navy);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(200,160,74,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .cta:active {
            transform: scale(0.97);
        }
        .cta svg {
            width: 18px; height: 18px;
        }

        /* Branding */
        .branding {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            opacity: 0.5;
        }

        @media (max-height: 680px) {
            .card { padding: 32px 24px 28px; }
            .photo { width: 100px; height: 100px; margin-bottom: 18px; }
            .name { font-size: 26px; }
            .tagline { margin-bottom: 22px; }
            .qr-wrap { padding: 12px; }
            .qr-wrap img, .qr-wrap canvas { width: 160px; height: 160px; }
            .scan-label { margin-bottom: 20px; }
            .cta { padding: 14px 32px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="grain" aria-hidden="true"></div>
    <div class="glow" aria-hidden="true"></div>

    <div class="card">
        <div class="photo">
            <img
                src="https://res.cloudinary.com/dniurvpzd/image/upload/v1769084034/Clarisse_Surin_image_hero_jm89nm.webp"
                alt="Clarisse Surin"
                width="130" height="130"
            >
        </div>

        <h1 class="name">Clarisse Surin</h1>
        <p class="tagline">Bâtonnat de Paris 2028</p>

        <div class="qr-wrap">
            <canvas id="qr"></canvas>
        </div>

        <p class="scan-label">Scannez pour me soutenir</p>

        <a href="run-for-justice.html" class="cta">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            Me soutenir
        </a>
    </div>

    <div class="branding">Bâtonnat 2028</div>

    <!-- QR Code — qrcode-generator (MIT) -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script>
    (function() {
        var typeNumber = 0;
        var errorCorrectionLevel = 'M';
        var qr = qrcode(typeNumber, errorCorrectionLevel);
        qr.addData('https://batonnat2028.com/run-for-justice.html');
        qr.make();

        var canvas = document.getElementById('qr');
        var ctx = canvas.getContext('2d');
        var count = qr.getModuleCount();
        var cellSize = 6;
        var size = count * cellSize;
        canvas.width = size;
        canvas.height = size;

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, size, size);
        ctx.fillStyle = '#0f1a2e';

        for (var row = 0; row < count; row++) {
            for (var col = 0; col < count; col++) {
                if (qr.isDark(row, col)) {
                    ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
                }
            }
        }
    })();
    </script>
</body>
</html>
