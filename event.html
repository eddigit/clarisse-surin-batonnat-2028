<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Soutenez Clarisse Surin — Bâtonnat 2028</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#2B2F33">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="manifest" href="manifest-event.json">
    <link rel="apple-touch-icon" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --dark: #2B2F33;
            --bg: #B7C5C0;
            --accent: #8FA8A0;
            --accent-hover: #7A958D;
            --accent-pale: rgba(143, 168, 160, 0.15);
            --card-bg: #F5F3EF;
            --text-main: #2B2F33;
            --text-muted: #74716D;
            --border: #C3C6C8;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        /* Grain overlay */
        .grain {
            position: fixed; inset: 0; z-index: 100;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* Glow ambient */
        .glow {
            position: fixed;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(143,168,160,0.12) 0%, transparent 70%);
            top: -100px; left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 48px 32px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0;
            animation: fadeUp 0.8s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Photo */
        .photo {
            width: 130px; height: 130px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--accent);
            box-shadow: 0 0 40px rgba(143,168,160,0.2);
            margin-bottom: 24px;
        }
        .photo img {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        /* Name */
        .name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .tagline {
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        /* QR container */
        .qr-wrap {
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .qr-wrap img, .qr-wrap canvas {
            display: block;
            width: 200px;
            height: 200px;
        }

        .scan-label {
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            margin-bottom: 28px;
        }

        .install-text small {
            color: var(--border);
        }

        /* CTA */
        .cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            background: var(--accent);
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(143,168,160,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .cta:active {
            transform: scale(0.97);
        }
        .cta svg {
            width: 18px; height: 18px;
        }

        /* Install banner */
        .install-banner {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--dark);
            border-top: 1px solid var(--border);
            padding: 14px 20px;
            display: none;
            align-items: center;
            justify-content: space-between;
            z-index: 200;
            animation: slideUp 0.4s ease-out;
        }
        .install-banner.show { display: flex; }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to   { transform: translateY(0); }
        }
        .install-text {
            font-size: 13px;
            color: #FFFFFF;
            line-height: 1.4;
        }
        .install-text small {
            display: block;
            color: var(--text-muted);
            font-size: 11px;
            margin-top: 2px;
        }
        .install-btn {
            padding: 8px 20px;
            background: var(--accent);
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
        }
        .install-close {
            background: none; border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            margin-left: 8px;
        }

        /* Branding */
        .branding {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            opacity: 0.5;
        }

        @media (max-height: 680px) {
            .card { padding: 32px 24px 28px; }
            .photo { width: 100px; height: 100px; margin-bottom: 18px; }
            .name { font-size: 26px; }
            .tagline { margin-bottom: 22px; }
            .qr-wrap { padding: 12px; }
            .qr-wrap img, .qr-wrap canvas { width: 160px; height: 160px; }
            .scan-label { margin-bottom: 20px; }
            .cta { padding: 14px 32px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="grain" aria-hidden="true"></div>
    <div class="glow" aria-hidden="true"></div>

    <div class="card">
        <div class="photo">
            <img
                src="https://res.cloudinary.com/dniurvpzd/image/upload/v1769084034/Clarisse_Surin_image_hero_jm89nm.webp"
                alt="Clarisse Surin"
                width="130" height="130"
            >
        </div>

        <h1 class="name">Clarisse Surin</h1>
        <p class="tagline">Bâtonnat de Paris 2028</p>

        <div class="qr-wrap">
            <canvas id="qr"></canvas>
        </div>

        <p class="scan-label">Scannez pour me soutenir</p>

        <a href="run-for-justice.html" class="cta">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            Me soutenir
        </a>
    </div>

    <div class="branding">Bâtonnat 2028</div>

    <!-- Install PWA banner -->
    <div class="install-banner" id="installBanner">
        <div class="install-text">
            Ajouter a l'ecran d'accueil
            <small>Ouvrir comme une application</small>
        </div>
        <button class="install-btn" id="installBtn">Installer</button>
        <button class="install-close" id="installClose" aria-label="Fermer">&times;</button>
    </div>

    <!-- PWA install + service worker -->
    <script>
    // Service worker registration
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw-event.js').catch(function() {});
    }

    // PWA install prompt (Android/Chrome)
    var deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBanner').classList.add('show');
    });
    document.getElementById('installBtn').addEventListener('click', function() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(function() { deferredPrompt = null; });
        }
        document.getElementById('installBanner').classList.remove('show');
    });
    document.getElementById('installClose').addEventListener('click', function() {
        document.getElementById('installBanner').classList.remove('show');
    });

    // iOS Safari — show manual instructions
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    var isStandalone = window.navigator.standalone === true;
    if (isIOS && !isStandalone) {
        var banner = document.getElementById('installBanner');
        banner.classList.add('show');
        var textEl = banner.querySelector('.install-text');
        textEl.textContent = 'Ajouter a l\'ecran d\'accueil';
        var small = document.createElement('small');
        small.textContent = 'Appuyez sur Partager puis "Sur l\'ecran d\'accueil"';
        textEl.appendChild(small);
        document.getElementById('installBtn').style.display = 'none';
    }
    </script>

    <!-- QR Code — qrcode-generator (MIT) -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script>
    (function() {
        var typeNumber = 0;
        var errorCorrectionLevel = 'M';
        var qr = qrcode(typeNumber, errorCorrectionLevel);
        qr.addData('https://batonnat2028.com/run-for-justice.html');
        qr.make();

        var canvas = document.getElementById('qr');
        var ctx = canvas.getContext('2d');
        var count = qr.getModuleCount();
        var cellSize = 6;
        var size = count * cellSize;
        canvas.width = size;
        canvas.height = size;

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, size, size);
        ctx.fillStyle = '#2B2F33';

        for (var row = 0; row < count; row++) {
            for (var col = 0; col < count; col++) {
                if (qr.isDark(row, col)) {
                    ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
                }
            }
        }
    })();
    </script>
</body>
</html>
