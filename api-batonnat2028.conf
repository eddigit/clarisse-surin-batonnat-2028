<VirtualHost *:80>
    ServerName api-batonnat.mybotia.com
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName api-batonnat.mybotia.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/mybotia.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/mybotia.com/privkey.pem

    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, POST, OPTIONS"
    Header always set Access-Control-Allow-Headers "Content-Type"

    RewriteEngine On
    RewriteCond %{REQUEST_METHOD} OPTIONS
    RewriteRule ^(.*)$ $1 [R=200,L]

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3004/
    ProxyPassReverse / http://127.0.0.1:3004/
</VirtualHost>
