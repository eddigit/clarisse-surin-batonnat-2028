<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0f1a2e"/>
  <g transform="translate(32,14)">
    <!-- Pillar -->
    <line x1="0" y1="0" x2="0" y2="34" stroke="#c8a04a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Base -->
    <line x1="-10" y1="34" x2="10" y2="34" stroke="#c8a04a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Beam -->
    <line x1="-18" y1="6" x2="18" y2="6" stroke="#c8a04a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left scale -->
    <line x1="-18" y1="6" x2="-18" y2="16" stroke="#c8a04a" stroke-width="1.8"/>
    <path d="M-24,16 Q-18,22 -12,16" fill="none" stroke="#c8a04a" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Right scale -->
    <line x1="18" y1="6" x2="18" y2="16" stroke="#c8a04a" stroke-width="1.8"/>
    <path d="M12,16 Q18,22 24,16" fill="none" stroke="#c8a04a" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Top circle -->
    <circle cx="0" cy="0" r="3.5" fill="#c8a04a"/>
  </g>
</svg>
