<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarisse Surin — Bâtonnat de Paris 2028</title>
    <meta name="description" content="Clarisse Surin, candidate au Bâtonnat de Paris 2028.">
    <meta name="theme-color" content="#0f1a2e">
    <meta property="og:title" content="Clarisse Surin — Bâtonnat de Paris 2028">
    <meta property="og:description" content="Candidate au Bâtonnat de Paris 2028. Rejoignez le mouvement.">
    <meta property="og:image" content="https://res.cloudinary.com/dniurvpzd/image/upload/v1769084034/Clarisse_Surin_image_hero_jm89nm.webp">
    <meta property="og:url" content="https://batonnat2028.com">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Bâtonnat 2028">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy-deep: #0f1a2e;
            --navy-mid: #162240;
            --or: #c8a04a;
            --or-clair: #dbb95e;
            --or-pale: rgba(200, 160, 74, 0.10);
            --text-bright: #f0ebe2;
            --text-muted: #8a8278;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--navy-deep);
            color: var(--text-bright);
            -webkit-font-smoothing: antialiased;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Subtle grain overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1;
        }

        /* Gold line accents */
        .line-top, .line-bottom {
            position: fixed;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--or), transparent);
            opacity: 0.25;
            z-index: 2;
        }
        .line-top { top: 0; }
        .line-bottom { bottom: 0; }

        /* Main container */
        .landing {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            animation: fadeIn 1.2s ease both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Photo */
        .photo-frame {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--or);
            box-shadow:
                0 0 0 6px var(--or-pale),
                0 8px 40px rgba(0,0,0,0.4);
            margin-bottom: 2.5rem;
            animation: photoIn 1s ease 0.3s both;
        }

        @keyframes photoIn {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Name */
        .name {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(2.2rem, 6vw, 3.2rem);
            font-weight: 700;
            letter-spacing: 0.02em;
            line-height: 1.15;
            margin-bottom: 0.6rem;
            animation: textIn 0.8s ease 0.5s both;
        }

        @keyframes textIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Divider */
        .divider {
            width: 48px;
            height: 2px;
            background: var(--or);
            margin: 1.2rem auto;
            animation: textIn 0.8s ease 0.65s both;
        }

        /* Title line */
        .title-line {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(1rem, 2.8vw, 1.3rem);
            font-weight: 400;
            font-style: italic;
            color: var(--or-clair);
            letter-spacing: 0.04em;
            animation: textIn 0.8s ease 0.8s both;
        }

        /* Subtitle */
        .subtitle {
            font-size: 0.82rem;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 2rem;
            animation: textIn 0.8s ease 1s both;
        }

        /* CTA link to form */
        .cta-link {
            display: inline-block;
            margin-top: 2.5rem;
            padding: 0.75rem 2rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--navy-deep);
            background: var(--or);
            border: none;
            border-radius: 4px;
            text-decoration: none;
            transition: background 0.25s ease, transform 0.15s ease, box-shadow 0.25s ease;
            animation: textIn 0.8s ease 1.2s both;
        }

        .cta-link:hover {
            background: var(--or-clair);
            box-shadow: 0 4px 20px rgba(200, 160, 74, 0.25);
            transform: translateY(-1px);
        }

        .cta-link:active {
            transform: translateY(0);
        }

        /* Responsive */
        @media (min-width: 520px) {
            .photo-frame {
                width: 220px;
                height: 220px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <div class="line-top"></div>
    <div class="line-bottom"></div>

    <main class="landing">
        <div class="photo-frame">
            <img
                src="https://res.cloudinary.com/dniurvpzd/image/upload/v1769084034/Clarisse_Surin_image_hero_jm89nm.webp"
                alt="Clarisse Surin"
                width="220"
                height="220"
            >
        </div>

        <h1 class="name">Clarisse Surin</h1>

        <div class="divider"></div>

        <p class="title-line">Candidate au Bâtonnat de Paris 2028</p>

        <p class="subtitle">Site officiel de campagne &mdash; bientot disponible</p>

        <a href="run-for-justice.html" class="cta-link">Rejoindre le mouvement</a>
    </main>

</body>
</html>
